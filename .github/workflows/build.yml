name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --build-config Release --output-on-failure

      - name: Smoke test
        shell: bash
        run: |
          BIN=$(find build -name "ckgrep*" -type f \( -perm -u+x -o -name "*.exe" \) | head -1)
          "$BIN" --version
          "$BIN" --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ckgrep-${{ matrix.os }}
          path: |
            build/source/ckgrep
            build/source/Release/ckgrep.exe
          if-no-files-found: ignore
